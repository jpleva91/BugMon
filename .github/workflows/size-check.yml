name: Size Check

on:
  pull_request:
    paths-ignore:
      - '*.md'
      - 'Documentation/**'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and check byte budget
        run: node scripts/build.js --no-sprites
