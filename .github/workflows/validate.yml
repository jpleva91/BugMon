name: Validate Game Data

on:
  pull_request:
    paths:
      - 'ecosystem/data/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate JSON data
        run: node .github/scripts/validate-data.mjs
